<style>
        /* Ambient Glow based on Album Art */
        .ambient-bg {
            background: radial-gradient(circle at 50% 30%, rgba(200, 80, 100, 0.4) 0%, rgba(50, 20, 30, 0.8) 50%, #141313 100%);
        }
        
        /* Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        
        .glass-button {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease-in-out;
        }
        
        .glass-button:active {
            background: rgba(255, 255, 255, 0.16);
            transform: scale(0.95);
        }

        /* Custom Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -4px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        .progress-fill {
            position: absolute;
            height: 4px;
            background: #ffffff;
            border-radius: 2px;
            pointer-events: none;
        }
    </style>

<script>
        // Simple script to link slider visual fill with input value
        const progressSlider = document.getElementById('progress-slider');
        const progressFill = document.getElementById('progress-fill');
        
        progressSlider.addEventListener('input', function() {
            progressFill.style.width = this.value + '%';
        });

        const volumeSlider = document.getElementById('volume-slider');
        const volumeFill = document.getElementById('volume-fill');
        
        volumeSlider.addEventListener('input', function() {
            volumeFill.style.width = this.value + '%';
        });
    </script>
